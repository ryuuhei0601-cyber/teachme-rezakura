// ============================
// ERROR BOUNDARY
// ============================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:40,textAlign:'center',fontFamily:'sans-serif'}}>
          <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
          <h2 style={{marginBottom:8}}>エラーが発生しました</h2>
          <p style={{color:'#6b7280',marginBottom:24}}>{String(this.state.error)}</p>
          <button onClick={() => { this.setState({error:null}); }} style={{padding:'10px 24px',background:'#4f9cf9',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:14}}>再読み込み</button>
        </div>
      );
    }
    return this.props.children;
  }

// ============================
// APP
// ============================
function App() {
  const [manuals, setManuals] = useState(() => {
    try {
      const s = localStorage.getItem('manuals');
      if (!s) return INITIAL_MANUALS;
      return JSON.parse(s);
    } catch { return INITIAL_MANUALS; }
  });
  const [page, setPage] = useState('home');
  const [selectedManual, setSelectedManual] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | error

  const navigate = (p) => { setPage(p); setSidebarOpen(false); };

  // GASへ保存する共通関数
  const pushToGAS = (data) => {
    if (!GAS_URL) return;
    setSyncStatus('syncing');
    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data),
      redirect: 'follow',
    })
    .then(() => setSyncStatus('ok'))
    .catch(() => setSyncStatus('error'));
  };

  // 起動時にGASからデータを取得
  useEffect(() => {
    if (!GAS_URL) return;
    setSyncStatus('syncing');
    fetch(GAS_URL, { redirect: 'follow' })
      .then(r => r.json())
      .then(data => {
        if (Array.isArray(data) && data.length > 0) {
          setManuals(data);
          try { localStorage.setItem('manuals', JSON.stringify(data)); } catch {}
        }
        setSyncStatus('ok');
      })
      .catch(() => setSyncStatus('error'));
  }, []);

  // localStorageへの保存
  useEffect(() => {
    try { localStorage.setItem('manuals', JSON.stringify(manuals)); } catch {}
  }, [manuals]);

  const openManual = (manual) => { setSelectedManual(manual); setPage('view'); };
  const editManual = (manual) => { setSelectedManual(manual); setPage('edit'); };
  const newManual = () => { setSelectedManual(null); setPage('new'); };

  const saveManual = (data) => {
    let next;
    if (data.id) {
      next = manuals.map(m => m.id === data.id ? data : m);
    } else {
      next = [{ ...data, id: Date.now() }, ...manuals];
    }
    setManuals(next);
    pushToGAS(next);
    setPage('list');
  };

  const deleteManual = (id) => {
    const next = manuals.filter(m => m.id !== id);
    setManuals(next);
    pushToGAS(next);
    setDeleteConfirm(null);
    if (page === 'view' || page === 'edit') setPage('list');
  };


  return (
    <div className="app">
      {/* SIDEBAR */}
      {sidebarOpen && <div className="sidebar-overlay" onClick={() => setSidebarOpen(false)} />}
      <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="sidebar-logo">
          <h1>TeachMe レザクラ</h1>
          <span>レザクラマニュアル管理</span>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">メイン</div>
          <div className={`nav-item ${page === 'home' ? 'active' : ''}`} onClick={() => navigate('home')}><Icon.Home /> ホーム</div>
        </nav>
      </aside>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <button className="hamburger" onClick={() => setSidebarOpen(o => !o)}>
            <span/><span/><span/>
          </button>
          <button className="topbar-logo" onClick={() => navigate('home')}>TeachMe レザクラ</button>
          <div className="topbar-title">
            {page === 'home' && 'ホーム'}
            {page === 'list' && 'マニュアル一覧'}
            {page === 'view' && selectedManual?.title}
            {page === 'edit' && 'マニュアルを編集'}
            {page === 'new' && '新しいマニュアルを作成'}
          </div>
          <div className="topbar-actions">
            {GAS_URL && syncStatus === 'syncing' && <span className="sync-badge syncing"><span className="sync-spin">↻</span> 同期中</span>}
            {GAS_URL && syncStatus === 'ok'      && <span className="sync-badge ok">✓ 同期済み</span>}
            {GAS_URL && syncStatus === 'error'   && <span className="sync-badge error">✗ 同期エラー</span>}
            {(page === 'home' || page === 'list') && (
              <button className="btn btn-primary" onClick={newManual}><Icon.Plus /><span className="btn-label"> 新規作成</span></button>
            )}
            {page === 'view' && selectedManual && (
              <>
                <button className="btn btn-secondary btn-sm" onClick={() => editManual(selectedManual)}><Icon.Edit /> 編集</button>
                <button className="btn btn-danger btn-sm" onClick={() => setDeleteConfirm(selectedManual)}><Icon.Trash /> 削除</button>
              </>
            )}
          </div>
        </div>


        <div className="content">
          {page === 'home' && <HomePage manuals={manuals} openManual={openManual} newManual={newManual} />}
          {page === 'list' && <ListPage manuals={manuals} openManual={openManual} />}
          {page === 'view' && selectedManual && <ViewPage manual={selectedManual} goBack={() => setPage('list')} />}
          {(page === 'edit' || page === 'new') && <EditPage manual={selectedManual} onSave={saveManual} onCancel={() => setPage(page === 'edit' ? 'view' : 'list')} />}
        </div>
      </div>

      {/* DELETE CONFIRM MODAL */}
      {deleteConfirm && (
        <div className="modal-overlay" onClick={() => setDeleteConfirm(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>マニュアルを削除しますか？</h3>
            <p>「{deleteConfirm.title}」を削除します。この操作は取り消せません。</p>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setDeleteConfirm(null)}>キャンセル</button>
              <button className="btn btn-danger" onClick={() => deleteManual(deleteConfirm.id)}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================
// HOME PAGE
// ============================
function HomePage({ manuals, openManual, newManual }) {
  return (
    <div>
      <div className="section-header">
        <div className="section-title">マニュアル一覧</div>
      </div>
      <div className="manuals-grid" style={{marginBottom:32}}>
        {manuals.map(m => <ManualCard key={m.id} manual={m} onClick={() => openManual(m)} />)}
      </div>
      <div style={{background:'linear-gradient(135deg,#4f9cf9,#7c3aed)',borderRadius:16,padding:'28px 32px',color:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:6}}>新しいマニュアルを作成しましょう</div>
          <div style={{fontSize:14,opacity:0.85}}>業務手順をステップで整理して、いつでも参照できます</div>
        </div>
        <button className="btn" style={{background:'rgba(255,255,255,0.2)',color:'#fff',backdropFilter:'blur(4px)',flexShrink:0}} onClick={newManual}><Icon.Plus /> 作成する</button>
      </div>
    </div>
  );
}

// ============================
// LIST PAGE
// ============================
function ListPage({ manuals, openManual }) {
  return (
    <div>
      {manuals.length === 0 ? (
        <div className="empty-state">
          <div style={{fontSize:48,marginBottom:16}}>📭</div>
          <h3>マニュアルがありません</h3>
          <p>まだマニュアルがありません</p>
        </div>
      ) : (
        <div className="manuals-grid">
          {manuals.map(m => <ManualCard key={m.id} manual={m} onClick={() => openManual(m)} />)}
        </div>
      )}
    </div>
  );
}

// ============================
// MANUAL CARD
// ============================
function ManualCard({ manual, onClick }) {
  return (
    <div className="manual-card" onClick={onClick}>

      <div className="card-body">
        <div className="card-title">{manual.title}</div>
        <div className="card-desc">{manual.description}</div>
        <div className="card-meta">
          <span className="card-steps">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            {manual.steps.length} ステップ
          </span>
        </div>
      </div>
    </div>
  );
}


// ============================
// VIEW PAGE
// ============================
function ViewPage({ manual, goBack }) {
  return (
    <div className="viewer-container">
      <div className="breadcrumb">
        <a onClick={goBack}>マニュアル一覧</a>
        <span>/</span>
        <span>{manual.title}</span>
      </div>
      <div className="viewer-header">
        <div className="viewer-title">{manual.title}</div>
        <div className="viewer-desc">{manual.description}</div>
        <div className="viewer-meta">
          <span className="viewer-meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            {manual.steps.length} ステップ
          </span>
        </div>
      </div>
      <div className="steps-list">
        {manual.steps.map((step, idx) => (
          <div key={step.id} className="step-item">
            <div className="step-header">
              <div className="step-number">{idx + 1}</div>
              <div className="step-title">{step.title}</div>
            </div>
            <div className="step-body">
              <div className="step-desc">{step.description}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================
// EDIT / NEW PAGE
// ============================
function EditPage({ manual, onSave, onCancel }) {
  const isNew = !manual;
  const [form, setForm] = useState({
    id: manual?.id || null,
    title: manual?.title || '',
    description: manual?.description || '',
    steps: manual?.steps || [{ id: Date.now(), title: '', description: '', checked: false }],
  });

  const setField = (k, v) => setForm(f => ({...f, [k]: v}));

  const addStep = () => setForm(f => ({...f, steps: [...f.steps, {id: Date.now(), title:'', description:''}]}));
  const removeStep = (id) => setForm(f => ({...f, steps: f.steps.filter(s => s.id !== id)}));
  const setStep = (id, k, v) => setForm(f => ({...f, steps: f.steps.map(s => s.id === id ? {...s, [k]: v} : s)}));

  return (
    <div className="editor-container">
      <div className="breadcrumb">
        <a onClick={onCancel}>{isNew ? 'マニュアル一覧' : manual.title}</a>
        <Icon.ChevronRight />
        <span>{isNew ? '新規作成' : '編集'}</span>
      </div>

      {/* Basic Info */}
      <div className="editor-card">
        <h3>基本情報</h3>


        <div className="form-group">
          <label className="form-label">タイトル <span style={{color:'#ef4444'}}>*</span></label>
          <input className="form-input" placeholder="例：新入社員オンボーディング" value={form.title} onChange={e => setField('title', e.target.value)} />
        </div>

        <div className="form-group">
          <label className="form-label">説明</label>
          <textarea className="form-textarea" placeholder="このマニュアルの概要を入力してください" value={form.description} onChange={e => setField('description', e.target.value)} />
        </div>

      </div>

      {/* Steps */}
      <div className="editor-card">
        <h3>作業ステップ</h3>

        {form.steps.map((step, idx) => (
          <div key={step.id} className="step-editor">
            <div className="step-editor-header">
              <span className="step-editor-num">STEP {idx + 1}</span>
              {form.steps.length > 1 && (
                <button className="btn-icon" onClick={() => removeStep(step.id)} style={{color:'#ef4444'}}><Icon.Trash /></button>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">タイトル</label>
              <input className="form-input" placeholder={`ステップ${idx+1}のタイトル`} value={step.title} onChange={e => setStep(step.id,'title',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">説明</label>
              <textarea className="form-textarea" placeholder="このステップで行う作業を詳しく説明してください" value={step.description} onChange={e => setStep(step.id,'description',e.target.value)} />
            </div>
          </div>
        ))}

        <button className="add-step-btn" onClick={addStep}><Icon.Plus /> ステップを追加</button>
      </div>

      {/* Actions */}
      <div style={{display:'flex',gap:12,justifyContent:'flex-end',paddingBottom:32}}>
        <button className="btn btn-secondary" onClick={onCancel}>キャンセル</button>
        <button className="btn btn-primary" onClick={() => {
          if (!form.title.trim()) { alert('タイトルを入力してください'); return; }
          if (form.steps.some(s => !s.title.trim())) { alert('すべてのステップにタイトルを入力してください'); return; }
          onSave({...form});
        }}><Icon.Check /> {isNew ? 'マニュアルを作成' : '変更を保存'}</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
